<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agendamento de Serviços | TOYOCAR</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-stone-950 text-stone-100 min-h-screen flex items-center justify-center p-4 antialiased relative bg-cover bg-center" style="background-image: linear-gradient(to bottom, rgba(12,10,9,0.92), rgba(12,10,9,0.96)), url('images/hero-bg.jpg');">

    <div class="w-full max-w-md bg-stone-900/90 border border-stone-800/80 rounded-2xl p-6 shadow-2xl backdrop-blur-sm space-y-5">
        
        <div class="text-center space-y-2">
            <img src="images/logo.png" alt="Logo TOYOCAR" class="mx-auto h-11 object-contain mb-1">
            <h1 class="text-lg font-black uppercase tracking-wider text-red-600">Agende sua Manutenção</h1>
            <p class="text-[11px] text-stone-400">Escolha os serviços e garanta o horário de entrada do seu veículo.</p>
        </div>

        <form id="formOficina" class="space-y-4">
            <div class="space-y-3">
                <div>
                    <label class="text-[10px] font-bold uppercase tracking-wider text-stone-400 block mb-1">Nome Completo</label>
                    <input type="text" id="nome" required class="w-full bg-stone-950 border border-stone-800 rounded-xl px-3 py-2.5 text-sm text-stone-200 focus:outline-none focus:border-red-600">
                </div>
                <div>
                    <label class="text-[10px] font-bold uppercase tracking-wider text-stone-400 block mb-1">Telefone (Whatsapp)</label>
                    <input type="text" id="telefone" placeholder="(00) 00000-0000" maxlength="15" required class="w-full bg-stone-950 border border-stone-800 rounded-xl px-3 py-2.5 text-sm text-stone-200 focus:outline-none focus:border-red-600">
                </div>
                <div>
                    <label class="text-[10px] font-bold uppercase tracking-wider text-stone-400 block mb-1">Modelo do Carro</label>
                    <input type="text" id="modelo" placeholder="Ex: Corolla 2.0 2018" required class="w-full bg-stone-950 border border-stone-800 rounded-xl px-3 py-2.5 text-sm text-stone-200 focus:outline-none focus:border-red-600">
                </div>
            </div>

            <div>
                <label class="text-[10px] font-bold uppercase tracking-wider text-stone-400 block mb-2">O que seu veículo precisa?</label>
                <div id="servicosContainer" class="space-y-2"></div>
            </div>

            <div id="wrapperOutros" class="hidden">
                <label class="text-[10px] font-bold uppercase tracking-wider text-red-600 block mb-1">Sintomas ou Detalhes Adicionais (opcional)</label>
                <textarea id="detalhesOutros" rows="2" class="w-full bg-stone-950 border border-stone-800 rounded-xl p-3 text-xs text-stone-300 focus:outline-none focus:border-red-600 resize-none"></textarea>
            </div>

            <div>
                <label class="text-[10px] font-bold uppercase tracking-wider text-stone-400 block mb-1">Selecione o Dia</label>
                <div class="relative">
                    <input type="date" id="dataAgendamento" required class="w-full bg-stone-950 border border-stone-800 rounded-xl px-3 py-2.5 text-sm text-stone-100 focus:outline-none focus:border-red-600 cursor-pointer">
                </div>
            </div>

            <div>
                <label class="text-[10px] font-bold uppercase tracking-wider text-stone-400 block mb-2">Horários Disponíveis de Entrada</label>
                <div id="vagasContainer" class="grid grid-cols-2 gap-2">
                    <p class="text-xs text-stone-500 col-span-full text-center py-2">Selecione uma data para checar as vagas.</p>
                </div>
            </div>

            <button type="submit" class="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-3 rounded-xl text-xs uppercase tracking-wider tracking-widest transition-colors shadow-lg mt-2">Confirmar e Reservar Vaga</button>
        </form>
            <div id="modalSucesso" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/80 backdrop-blur-sm animate-fade-in">
                <div class="bg-stone-900 border border-stone-800 p-6 rounded-2xl max-w-md w-full text-center space-y-4 shadow-2xl">
                    <div class="mx-auto w-12 h-12 rounded-full bg-emerald-950/50 border border-emerald-500/30 flex items-center justify-center">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-emerald-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7" />
                        </svg>
                    </div>
                    
                    <h3 class="text-xl font-bold text-stone-100">Vaga Reservada!</h3>
                    
                    <p id="modalMensagemTexto" class="text-sm text-stone-400 leading-relaxed">
                        Seu agendamento foi realizado com sucesso.
                    </p>

                    <div class="pt-2 border-t border-stone-800 flex flex-col space-y-2">
                        <a id="btnAdicionarAgenda" href="#" target="_blank" class="w-full bg-stone-950 border border-stone-800 text-stone-300 hover:text-white hover:border-red-600 px-4 py-2.5 rounded-xl text-sm font-semibold transition-all flex items-center justify-center space-x-2">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-red-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 2 0 002-2V7a2 2 2 0 00-2-2H5a2 2 2 0 00-2 2v12a2 2 2 0 002 2z" />
                            </svg>
                            <span>Adicionar ao meu Calendário</span>
                        </a>
                        
                        <button onclick="fecharModalSucesso()" class="w-full bg-red-600 hover:bg-red-700 text-white px-4 py-2.5 rounded-xl text-sm font-bold transition-colors">
                            Entendido
                        </button>
                    </div>
                </div>
            </div>

            </div>
            <footer class="absolute bottom-4 left-0 w-full text-center pointer-events-none">
                <p class="text-[10px] uppercase tracking-widest text-stone-600 font-medium">
                    &copy; 2026 <span class="text-stone-500 font-bold">VTK Technologies</span> • Todos os direitos reservados.
                </p>
            </footer>

            <script src="script.js"></script>
            <script>inicializarCliente();</script>
        </body>
        </html>

    <script src="script.js"></script>
    <script>inicializarCliente();</script>
</body>
</html>
