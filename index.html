<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agendamento de Serviços | TOYOCAR</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-stone-950 text-stone-100 min-h-screen flex items-center justify-center p-4 antialiased relative bg-cover bg-center bg-fixed" style="background-image: linear-gradient(to bottom, rgba(12,10,9,0.92), rgba(12,10,9,0.96)), url('images/hero-bg.jpg');">

    <div class="w-full max-w-md bg-stone-900/90 border border-stone-800/80 rounded-2xl p-6 shadow-2xl backdrop-blur-sm space-y-5 my-8">
        
        <div class="text-center space-y-2">
            <img src="images/logo.png" alt="Logo TOYOCAR" class="mx-auto h-11 object-contain mb-1">
            <h1 class="text-lg font-black uppercase tracking-wider text-red-600">Agendamento de Serviços</h1>
            <p class="text-xs text-stone-400">Reserve o seu horário na oficina mecânica em poucos passos.</p>
        </div>

        <form id="formOficina" class="space-y-4">
            
            <div>
                <label class="block text-xs uppercase tracking-wider text-stone-400 font-bold mb-2">Seu Nome Completo</label>
                <input type="text" id="nome" required placeholder="Ex: Fulano da Silva" class="w-full bg-stone-950 border border-stone-850 rounded-xl px-4 py-3 text-sm text-stone-100 placeholder-stone-600 focus:outline-none transition-all">
            </div>

            <div>
                <label class="block text-xs uppercase tracking-wider text-stone-400 font-bold mb-2">Telefone de Contato (WhatsApp)</label>
                <input type="tel" id="telefoneCliente" required placeholder="(45) 99999-9999" class="w-full bg-stone-950 border border-stone-850 rounded-xl px-4 py-3 text-sm text-stone-100 placeholder-stone-600 focus:outline-none transition-all">
            </div>

            <div>
                <label class="block text-xs uppercase tracking-wider text-stone-400 font-bold mb-2">Modelo do Veículo</label>
                <input type="text" id="modelo" required placeholder="Ex: Corolla 2.0 2018" class="w-full bg-stone-950 border border-stone-850 rounded-xl px-4 py-3 text-sm text-stone-100 placeholder-stone-600 focus:outline-none transition-all">
            </div>

            <div>
                <label class="block text-xs uppercase tracking-wider text-stone-400 font-bold mb-2">Selecione os Serviços Necessários</label>
                <div id="servicosContainer" class="space-y-2">
                    </div>
            </div>

            <div id="wrapperOutros" class="hidden transition-all">
                <label class="block text-xs uppercase tracking-wider text-stone-400 font-bold mb-2">Descrição dos Sintomas / Avaliação</label>
                <textarea id="detalhesOutros" rows="3" class="w-full bg-stone-950 border border-stone-850 rounded-xl px-4 py-3 text-sm text-stone-100 placeholder-stone-600 focus:outline-none transition-all resize-none"></textarea>
            </div>

            <div>
                <label class="block text-xs uppercase tracking-wider text-stone-400 font-bold mb-2">Escolha a Data do Atendimento</label>
                <div class="relative">
                    <input type="date" id="dataAgendamento" required class="w-full bg-stone-950 border border-stone-850 rounded-xl px-4 py-3 text-sm text-stone-100 focus:outline-none transition-all">
                </div>
            </div>

            <div>
                <label class="block text-xs uppercase tracking-wider text-stone-400 font-bold mb-2">Horários Disponíveis</label>
                <div id="vagasContainer" class="grid grid-cols-3 gap-2">
                    <p class="text-xs text-stone-500 col-span-full text-center py-2">Selecione uma data para checar as vagas.</p>
                </div>
            </div>

            <div class="pt-2">
                <button type="submit" class="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-3 px-4 rounded-xl text-sm uppercase tracking-wider shadow-lg shadow-red-900/20 transition-all transform active:scale-[0.99]">
                    Confirmar Minha Vaga
                </button>
            </div>

        </form>

        <p class="text-[10px] text-center text-stone-600 font-medium uppercase tracking-widest pt-2 border-t border-stone-850/40">
            TOYOCAR &copy; 2026 • Sistema de Agendamentos
        </p>

    </div>

    <div id="modalSucesso" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/80 backdrop-blur-sm animate-fade-in">
        <div class="bg-stone-900 border border-stone-800 p-6 rounded-2xl max-w-md w-full text-center space-y-4 shadow-2xl">
            
            <div class="mx-auto w-12 h-12 rounded-full bg-emerald-950/50 border border-emerald-500/30 flex items-center justify-center">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-emerald-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7" />
                </svg>
            </div>
            
            <h3 class="text-xl font-black text-stone-100 uppercase tracking-wide">Vaga Reservada!</h3>
            
            <p id="modalMensagemTexto" class="text-sm text-stone-400 leading-relaxed">
                Seu agendamento foi processado e salvo com sucesso.
            </p>

            <div class="pt-2 border-t border-stone-800 flex flex-col space-y-2">
                <a id="btnAdicionarAgenda" href="#" download="agendamento_toyocar.ics" class="w-full bg-stone-950 border border-stone-800 text-stone-300 hover:text-white hover:border-red-600 px-4 py-2.5 rounded-xl text-sm font-semibold transition-all flex items-center justify-center space-x-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-red-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
                    </svg>
                    <span>Adicionar ao meu Calendário</span>
                </a>
                
                <button onclick="fecharModalSucesso()" class="w-full bg-red-600 hover:bg-red-700 text-white px-4 py-2.5 rounded-xl text-sm font-bold transition-colors shadow-lg shadow-red-950/40">
                    Entendido
                </button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
